pchem_species:
  ops:
    # DAS or REPLAY Mode (AGCM.rc:  pchem_clim_years = 1-Year Climatology)
    species_data: PCHEM/pchem.species.Clim_Prod_Loss.z_721x72.nc4
  cmip:
    # CMIP-5 Ozone Data (AGCM.rc:  pchem_clim_years = 228-Years)
    species_data: PCHEM/pchem.species.CMIP-5.1870-2097.z_91x72.nc4
  s2s:
    # S2S pre-industrial with prod/loss of stratospheric water vapor
    # (AGCM.rc:  pchem_clim_years = 3-Years,  and  H2O_ProdLoss: 1 )
    species_data: Shared/pchem.species.CMIP-6.wH2OandPL.1850s.z_91x72.nc4
  merra-2:
    # MERRA-2 Ozone Data (AGCM.rc:  pchem_clim_years = 39-Years)
    species_data: PCHEM/pchem.species.CMIP-5.MERRA2OX.197902-201706.z_91x72.nc4

