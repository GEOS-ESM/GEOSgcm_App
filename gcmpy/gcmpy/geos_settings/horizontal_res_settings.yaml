# -------------------------------------------------------------------             # YAML file using Jinja2 templates
# After reading this file, we need to pass
# parameters to resolve the templates. The parameters
# are: OM_NAME, OCEAN_NX, OCEAN_NY.
# They are passed in a dictionary:
#  data = {
#     'OM_NAME': atmos.expConfig['OM_name'],
#     'OCEAN_NX': ocean_nx,
#     'OCEAN_NY': ocean_ny
#  }
# -------------------------------------------------------------------

c12:
  heartbeat: 1200
  {%- if "{{ OM_NAME }}" == "MOM6" %}
  {% set NX = 1 %}
  {%- else %}
  {% set NX = 2 %}
  {%- endif %}
  nx: {{ NX }}
  ny: {{ NX * 6 }}
  conv_dt: 1200
  chem_dt: 3600
  dt_solar: 3600
  dt_irrad: 3600
  dt_ocean: 3600
  job_sgmt: "{{ '%08d' | format(15) }}" # f"{15:08}"
  num_sgmt: 20
  post_NDS: 4
  nx_convert: 1
  ny_convert: 
  res: 'CF0012x6C'
  low_res: True
  mit_horizontal_res: [""]
  ocean_res_default:
    - 'o2 (1/4-deg, 1440x720  MERRA-2)'
    - 'o3 (1/8-deg, 2880x1440 OSTIA)'
    - 'o1 (1  -deg,  360x180  Reynolds, ends in 2022)'

