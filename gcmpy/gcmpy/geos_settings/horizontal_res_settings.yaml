c90:
  heartbeat: 900
  {%- if "{{ OM_NAME }}" == "MIT" %}
  nx: 10
  ny: 36
  dt_ocean: {{ heartbeat }}
  {%- elif "{{ OM_NAME }}" == "MOM5" %}
  nx: {{ OCEAN_NX }}
  ny: {{ OCEAN_NY }}
  dt_ocean: {{ heartbeat }}
  {%- elif "{{ OM_NAME }}" == "MOM6" %}
  nx: 5
  ny: 36
  dt_ocean: {{ heartbeat }}
  {%- else %}
  {% set NX = 10 %}
  nx: {{ NX }}
  ny: {{ NX * 6 }}
  dt_ocean: 3600
  {%- endif %}
  conv_dt: 900
  chem_dt: 1800
  dt_solar: 3600
  dt_irrad: 3600
  job_sgmt: "{{ '%08d' | format(32) }}" # f"{32:08}"
  num_sgmt: 4
  post_NDS: 8
  res: 'CF0090x6C'
  mit_horizontal_res: [""]
  ocean_res_default:
    - 'CS (Cubed-Sphere OSTIA)'
    - 'o2 (1/4-deg, 1440x720  MERRA-2)'
    - 'o3 (1/8-deg, 2880x1440 OSTIA)'
    - 'o1 (1  -deg,  360x180  Reynolds, ends in 2022)'

