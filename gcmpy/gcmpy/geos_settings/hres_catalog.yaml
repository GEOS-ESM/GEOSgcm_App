
## Begin defining anchors
# In YAML, anchors (&) and aliases (*) 
# are used to define a chunk of configuration 
# once and reuse it elsewhere, keeping the 
# file DRY (Don't Repeat Yourself)

ocean_res_1: &idocean1
- 'o2 (1/4-deg, 1440x720  MERRA-2)'
- 'o3 (1/8-deg, 2880x1440 OSTIA)'
- 'o1 (1  -deg,  360x180  Reynolds, ends in 2022)'

ocean_res_2: &idocean2
- 'CS (Cubed-Sphere OSTIA)'
- 'o2 (1/4-deg, 1440x720  MERRA-2)'
- 'o3 (1/8-deg, 2880x1440 OSTIA)'
- 'o1 (1  -deg,  360x180  Reynolds, ends in 2022)'
    
## End defining anchors

